<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Signal</title>
    <link rel="stylesheet" href="./style.css?v=yunjin-clear-20260608" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <p>LOL SIGNAL</p>
        <button id="shareTop">공유</button>
      </header>

      <section class="hero">
        <h1>SIGNAL</h1>
      </section>

      <section class="grid" aria-label="메뉴">
        <button class="tile" data-mode="tarot">
          <span>연애운 타로</span>
          <strong>오늘의 카드</strong>
        </button>
        <button class="tile" data-mode="balance">
          <span>밸런스 16강</span>
          <strong>이상형 월드컵</strong>
        </button>
        <button class="tile" data-mode="flirt">
          <span>플러팅 멘트</span>
          <strong>한 줄 뽑기</strong>
        </button>
        <button class="tile" data-mode="roulette">
          <span>질문 룰렛</span>
          <strong>엉뚱한 질문</strong>
        </button>
      </section>

      <section class="stage" id="stage">
        <p class="kicker" id="stageKicker">SIGNAL STUDIO</p>
        <h2 id="stageTitle">오늘의 신호를 가볍게 열어보기</h2>
        <p id="stageBody">메뉴를 누르면 타로, 밸런스 16강, 플러팅 멘트, 질문 룰렛이 모달로 바로 열립니다.</p>
        <div class="actions" id="stageActions"></div>
      </section>

      <section class="share-box">
        <div>
          <p class="kicker">SHARE QR</p>
          <h2>이 링크를 바로 넘기기</h2>
        </div>
        <img id="qrImage" alt="앱 공유 QR" />
        <button class="primary" id="shareMain">앱 공유하기</button>
      </section>
    </main>

    <div class="modal" id="resultModal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <p class="kicker" id="modalKicker">RESULT</p>
        <h2 id="modalTitle">결과</h2>
        <p id="modalBody"></p>
        <div id="modalExtra"></div>
        <div class="modal-actions">
          <button class="primary" id="modalRetry">다시</button>
          <button id="modalClose">닫기</button>
        </div>
      </section>
    </div>

    <div class="toast" id="toast">복사했습니다.</div>
    <script src="./app.js?v=yunjin-clear-20260608"></script>
  </body>
</html>
