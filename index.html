<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Signal</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <p>LOL SIGNAL</p>
        <button id="shareTop">공유</button>
      </header>

      <section class="hero">
        <h1>SIGNAL</h1>
      </section>

      <section class="grid" aria-label="메뉴">
        <button class="tile" data-mode="tarot">
          <span>연애운 타로</span>
          <strong>오늘의 카드</strong>
        </button>
        <button class="tile" data-mode="balance">
          <span>밸런스 16강</span>
          <strong>이상형 월드컵</strong>
        </button>
        <button class="tile" data-mode="flirt">
          <span>플러팅 멘트</span>
          <strong>한 줄 뽑기</strong>
        </button>
        <button class="tile" data-mode="roulette">
          <span>질문 룰렛</span>
          <strong>엉뚱한 질문</strong>
        </button>
      </section>

      <section class="stage" id="stage">
        <p class="kicker" id="stageKicker">QUESTION ROULETTE</p>
        <h2 id="stageTitle">처음 만난 사람에게 “사랑”으로 2행시 지어달라고 하면?</h2>
        <p id="stageBody" hidden></p>
        <div class="actions" id="stageActions">
          <button class="primary" id="drawButton">다시 뽑기</button>
          <button id="copyButton">복사</button>
        </div>
      </section>

      <section class="share-box">
        <div>
          <p class="kicker">SHARE QR</p>
          <h2>이 링크를 바로 넘기기</h2>
        </div>
        <img id="qrImage" alt="앱 공유 QR" />
        <button class="primary" id="shareMain">앱 공유하기</button>
      </section>
    </main>

    <div class="toast" id="toast">복사했습니다.</div>
    <script src="./app.js"></script>
  </body>
</html>
